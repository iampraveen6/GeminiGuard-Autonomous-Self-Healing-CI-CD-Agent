name: GeminiGuard CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  # ----------------------------------
  # ✅ STEP 1: NORMAL BUILD + TEST JOB
  # ----------------------------------
  build:
    runs-on: ubuntu-latest

    outputs:
      test_failed: ${{ steps.test.outputs.failed }}

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: ✅ Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ✅ Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      # ✅ Run tests and capture failure
      - name: ✅ Run tests
        id: test
        env:
          TEST_MODE: "true"
        run: |
          source venv/bin/activate
          set +e
          pytest > logs.txt
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      # ✅ Upload logs for next job
      - name: ✅ Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs.txt


  # ----------------------------------
  # ✅ STEP 2: SELF HEALING JOB
  # ----------------------------------
  self_heal:
    needs: build
    if: needs.build.outputs.test_failed == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: ✅ Checkout
        uses: actions/checkout@v4

      - name: ✅ Download logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs
          path: .

      - name: ✅ Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ✅ Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      # ✅ Run GeminiGuard (THIS IS YOUR AGENT)
      - name: ✅ Run Self-Healing Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}

        run: |
          source venv/bin/activate
          echo "📄 Reading Failure Logs..."
          python main.py